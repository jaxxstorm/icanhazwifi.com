<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>WiFi Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
            padding: 20px;
            line-height: 1.5;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            border: 1px solid #ddd;
            padding: 30px;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #111;
        }
        p {
            margin-bottom: 15px;
            color: #555;
        }
        .notice {
            background: #f9f9f9;
            border-left: 3px solid #0066cc;
            padding: 15px;
            margin: 20px 0;
        }
        .notice p {
            margin: 0;
        }
        .info {
            font-size: 14px;
            color: #666;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>WiFi Access</h1>
        <p>You are now connected to the network.</p>
        
        <div class="notice">
            <p>If your browser doesn't automatically redirect, you may need to close this window and open a new browser tab.</p>
        </div>
        
        <p>Your device should now have internet access. Try visiting any website to verify your connection.</p>
        
        <div class="info">
            <p>Connection established at <span id="time"></span></p>
        </div>
    </div>
    
    <script>
        document.getElementById('time').textContent = new Date().toLocaleTimeString();
        
        if (performance.navigation.type === performance.navigation.TYPE_BACK_FORWARD) {
            location.reload(true);
        }

        // Captive portal detection
        const isCaptivePortal = () => {
            const ua = navigator.userAgent.toLowerCase();
            const url = window.location.href.toLowerCase();
            
            // Check for captive portal user agents
            const captivePortalUAs = [
                'captivenetworksupport',
                'wispr',
                'cnclient',
                'android'
            ];
            
            // Check if opened from detection URLs
            const captivePortalPaths = [
                'generate_204',
                'hotspot-detect',
                'connecttest'
            ];
            
            const isPortalUA = captivePortalUAs.some(cp => ua.includes(cp));
            const isPortalPath = captivePortalPaths.some(path => url.includes(path));
            
            // Check if window was opened without referrer (common for captive portals)
            const noReferrer = !document.referrer;
            
            return isPortalUA || isPortalPath || (noReferrer && ua.includes('android'));
        };

        // Test connectivity to external resource
        const testConnectivity = async () => {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3000);
                
                const response = await fetch('https://www.gstatic.com/generate_204', {
                    method: 'HEAD',
                    mode: 'no-cors',
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                return true;
            } catch (e) {
                return false;
            }
        };

        // Update UI based on portal detection
        const updatePortalStatus = async () => {
            const inPortal = isCaptivePortal();
            const hasConnectivity = await testConnectivity();
            
            if (inPortal) {
                console.log('Captive portal environment detected');
                document.title = 'WiFi Login Required';
            }
            
            if (!hasConnectivity) {
                const notice = document.querySelector('.notice p');
                notice.textContent = 'Click anywhere on this page to complete WiFi login.';
                document.body.style.cursor = 'pointer';
                document.body.addEventListener('click', () => {
                    // Attempt to trigger captive portal login flow
                    window.location.reload();
                }, { once: true });
            }
        };

        updatePortalStatus();
    </script>
</body>
</html>
